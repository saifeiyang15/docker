name: Deploy Flight Chess Game

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: flight-chess-game
  REMOTE_DIR: /opt/flight-chess-game

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ========== 1. 拉取代码 ==========
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== 2. 同步文件到服务器 ==========
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync project files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='node_modules/' \
            --exclude='target/' \
            --exclude='build/' \
            --exclude='.git/' \
            --exclude='.idea/' \
            --exclude='.vscode/' \
            --exclude='*.log' \
            --exclude='*.pid' \
            --exclude='*.tar.gz' \
            --exclude='.DS_Store' \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.REMOTE_DIR }}/

      # ========== 3. 在服务器上构建并部署 ==========
      - name: Build and deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd /opt/flight-chess-game

          echo "🛑 Stopping old containers..."
          docker-compose -f docker-compose.prod.yml down || true

          echo "🔨 Rebuilding all images (frontend uses multi-stage Docker build)..."
          docker-compose -f docker-compose.prod.yml build --no-cache

          echo "🚀 Starting all containers..."
          docker-compose -f docker-compose.prod.yml up -d

          echo "⏳ Waiting for services to start..."
          sleep 30

          echo "📊 Container status:"
          docker-compose -f docker-compose.prod.yml ps
          ENDSSH

      # ========== 5. 健康检查 ==========
      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e

          echo "🔍 Running health checks..."

          # 检查前端
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Frontend health check failed"
              docker-compose -f /opt/flight-chess-game/docker-compose.prod.yml logs frontend --tail=20
              exit 1
            fi
            sleep 2
          done

          # 检查后端（使用 HTTP 状态码判断，401/403 也说明服务已启动）
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/validate 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Backend is healthy (HTTP $HTTP_CODE)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Backend health check failed - service not responding"
              docker-compose -f /opt/flight-chess-game/docker-compose.prod.yml logs backend --tail=20
              exit 1
            fi
            sleep 2
          done

          # 验证 nginx 代理配置
          if docker exec flight-chess-frontend cat /etc/nginx/conf.d/default.conf | grep -q "proxy_pass"; then
            echo "✅ Nginx proxy config is active"
          else
            echo "⚠️ Warning: Nginx proxy config may not be active"
          fi

          # 验证前端产物无 localhost 引用
          if docker exec flight-chess-frontend sh -c "grep -r 'localhost:8080' /usr/share/nginx/html/" 2>/dev/null; then
            echo "⚠️ Warning: localhost:8080 still found in frontend files"
          else
            echo "✅ No localhost:8080 in frontend files"
          fi

          echo ""
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Frontend: http://$(curl -s ifconfig.me)"
          ENDSSH

      # ========== 6. 清理 SSH 密钥 ==========
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
